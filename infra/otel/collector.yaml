receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  batch:
    timeout: 5s
    send_batch_size: 1024
  resource/taskapi:
    attributes:
      - key: service.namespace
        value: taskapi
        action: upsert

exporters:
  debug:
    verbosity: basic

  otlphttp/grafana_cloud:
    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    headers:
      Authorization: Basic ${env:GRAFANA_CLOUD_OTLP_BASIC_AUTH}
    compression: gzip

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/taskapi, batch]
      exporters: [debug, otlphttp/grafana_cloud]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/taskapi, batch]
      exporters: [debug, otlphttp/grafana_cloud]
